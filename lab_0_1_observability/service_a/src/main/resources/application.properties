spring.application.name=service_a
server.port=8080
services.b.url=http://localhost:8081
# services.b.url=http://localhost:18081
management.endpoints.web.exposure.include=health,metrics,prometheus

management.tracing.sampling.probability=1.0

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/lab_db
spring.datasource.username=lab_user
spring.datasource.password=lab_pass

# HikariCP — intentionally tiny pool to make exhaustion obvious
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.leak-detection-threshold=2000
management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4318/v1/traces
# Jaeger only supports traces, not metrics - disable OTLP metrics export to avoid 404
management.otlp.metrics.export.enabled=false

server.tomcat.threads.max=5
server.tomcat.threads.min-spare=2