services:
  lab2_postgres:
    image: postgres:16
    container_name: lab2_postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: lab_db
      POSTGRES_USER: lab_user
      POSTGRES_PASSWORD: lab_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab_user -d lab_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  lab2_pgbouncer:
    image: edoburu/pgbouncer:latest
    platform: linux/amd64
    environment:
      DB_USER: lab_user
      DB_PASSWORD: lab_pass
      DB_HOST: lab2_postgres
      DB_NAME: lab_db
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 5
    ports:
      - "6432:5432"
    depends_on:
      lab2_postgres:
        condition: service_healthy

  lab2_app1:
    build:
      context: ../../service_a
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - lab2_pgbouncer

  lab2_app2:
    build:
      context: ../../service_a
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - lab2_pgbouncer

  lab2_app3:
    build:
      context: ../../service_a
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - lab2_pgbouncer

  nginx:
    image: nginx:alpine
    container_name: lab2-nginx
    ports:
      - "8090:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - lab2_app1
      - lab2_app2
      - lab2_app3